name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
      - name: Verify demo and dogfood receipts
        run: |
          node -e 'const fs=require("fs");const demo=JSON.parse(fs.readFileSync("demo/latest/receipt.json"));if(!demo.success||demo.sawyer_interventions!==0||demo.incorrect_stop!==false)process.exit(1)'
          node scripts/dogfood-report.mjs
